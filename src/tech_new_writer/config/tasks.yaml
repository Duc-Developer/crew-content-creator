trend_research_task:
  description: >
    Research {topic} from the approved sources below and extract only strong,
    recent and source-grounded signals using the fetched source digest.

    Approved sources:
    {sources}

    Fetched source digest:
    {source_digest}

    Requirements:
    - Focus on the current year {current_year}.
    - Use only items present in the fetched source digest as evidence.
    - If a source digest section is empty or failed to load, ignore that source instead of inventing data.
    - Prioritize stories, tutorials, launches, benchmarks, engineering lessons and trends
      that are likely to matter to a Vietnamese tech audience.
    - For each finding, include: source name, source URL, headline/topic, why it matters,
      and the likely audience value.
    - Ignore low-signal news, duplicated angles and speculative claims without support.
  expected_output: >
    A markdown research brief with 8-12 source-grounded findings. Each finding must contain:
    source, url, insight summary, why it matters, and relevance for Vietnamese readers.
    If fewer than 8 valid findings are available in the digest, return only the validated findings available.
  agent: trend_researcher

technical_review_task:
  description: >
    Review the research brief and validate the technical substance for {topic}.

    Requirements:
    - Check terminology, technical claims, causal statements and implied conclusions.
    - Identify risks, limitations, assumptions, hype and missing context.
    - Mark which findings are strong enough to keep in the final article.
    - Add concise technical explanations where needed so the writer can explain the topic correctly.
  expected_output: >
    A markdown technical review containing:
    1) validated insights to keep,
    2) claims to soften or remove,
    3) technical clarifications,
    4) recommended angles for a high-quality article.
  agent: sme

seo_planning_task:
  description: >
    Build an SEO plan for a Vietnamese article about {topic} using the research and technical review.

    Requirements:
    - Define primary keyword, secondary keywords and search intent.
    - Propose a compelling Vietnamese title, slug and meta description.
    - Recommend heading structure and content angles that balance SEO with editorial quality.
    - Avoid clickbait and keyword stuffing.
  expected_output: >
    A markdown SEO brief containing primary keyword, secondary keywords, search intent,
    title options, suggested slug, meta description, and recommended H1/H2/H3 structure.
  agent: seo_specialist

article_writing_task:
  description: >
    Write a high-quality Vietnamese article about {topic} using the research brief,
    technical review, SEO brief and image digest.

    Available image digest:
    {image_digest}

    Requirements:
    - Write in Vietnamese.
    - Preserve factual accuracy and only use claims supported by the previous steps.
    - Start with a strong introduction explaining why the topic matters now.
    - Organize the article into a clear, reader-friendly structure with meaningful headings.
    - Synthesize insights from the approved sources instead of copying any source wording.
    - Select the most relevant source-grounded image from the image digest for the article cover if one is available.
    - Add a short metadata block near the top in markdown using this exact format:
      Cover Image: <image url or empty>
      Cover Image Source: <source article url or empty>
    - Include a short section summarizing practical implications for engineers, builders or tech leaders in Vietnam.
    - End with a concise conclusion.
  expected_output: >
    A polished Vietnamese markdown article ready for final editing, with a title,
    intro, structured sections, conclusion and a short "Nguồn tham khảo" section listing source URLs.
  agent: content_writer

final_edit_task:
  description: >
    Edit the drafted Vietnamese article into a publication-ready final version.

    Requirements:
    - Improve clarity, flow, consistency and tone.
    - Remove repetition, weak transitions and unnecessary filler.
    - Preserve technical accuracy and SEO intent.
    - Ensure the final article reads naturally for Vietnamese tech readers.
    - Preserve the cover image metadata block if present.
    - Output only the final article in markdown format.
  expected_output: >
    A final publication-ready Vietnamese markdown article without code fences.
  agent: editor

single_article_research_task:
  description: >
    Analyze one specific source article for translation and adaptation into Vietnamese.

    Source article URL:
    {top_article_url}

    Source digest:
    {source_digest}

    Image digest:
    {image_digest}

    Requirements:
    - Focus on the selected article URL and the evidence available in the digests.
    - Identify the article's key thesis, technical points, structure and useful takeaways.
    - Do not invent details beyond the available source material.
    - Extract what matters most for Vietnamese readers.
  expected_output: >
    A markdown brief for one source article including:
    source url, article title, key points, technical context, audience value, and usable image candidates.
  agent: trend_researcher

single_article_technical_review_task:
  description: >
    Review the selected source article brief for technical accuracy and adaptation quality.

    Requirements:
    - Validate technical claims and terminology.
    - Flag nuances or caveats that should be preserved in translation.
    - Recommend how to adapt the article faithfully for Vietnamese readers.
  expected_output: >
    A markdown technical review for the selected source article with validated claims,
    caveats, terminology notes and adaptation guidance.
  agent: sme

single_article_seo_task:
  description: >
    Build an SEO brief for a Vietnamese adaptation of the selected source article.

    Requirements:
    - Propose a Vietnamese title and search intent.
    - Suggest a keyword cluster and heading structure suitable for a translated/adapted article.
    - Keep the article honest to the source while making it discoverable.
  expected_output: >
    A markdown SEO brief for the selected source article adaptation with title,
    intent, keywords, slug suggestion and H1/H2/H3 structure.
  agent: seo_specialist

single_article_writing_task:
  description: >
    Write a Vietnamese adaptation of the selected source article using the article brief,
    technical review, SEO brief and image digest.

    Requirements:
    - Write in Vietnamese.
    - Preserve the article's main ideas and factual claims.
    - Adapt phrasing naturally instead of literal translation.
    - If the original article title is available, prefer adapting that title into natural Vietnamese.
    - If the original title is unavailable, infer a strong new Vietnamese title from the source article brief.
    - Include a cover image metadata block if a relevant image is available.
    - Add a "Nguồn gốc bài viết" section linking to the original article URL.
  expected_output: >
    A polished Vietnamese markdown adaptation of the selected source article,
    ready for final editing and publishing as a draft.
  agent: content_writer

single_article_final_edit_task:
  description: >
    Edit the Vietnamese adaptation of the selected source article into a publication-ready final version.

    Requirements:
    - Improve clarity, flow and natural Vietnamese style.
    - Preserve the cover image metadata block if present.
    - Preserve faithfulness to the original source article.
  expected_output: >
    A final publication-ready Vietnamese markdown adaptation without code fences.
  agent: editor
